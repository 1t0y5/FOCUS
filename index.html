<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f1ea">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>FOCUS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <section id="splash" class="screen active splash" aria-label="起動画面">
    <button id="splashButton" class="splash-button" aria-label="FOCUSを始める">
      <span>FOCUS</span>
    </button>
  </section>

  <section id="entry" class="screen entry">
    <header class="topbar">
      <div class="brand">FOCUS</div>
      <button id="openArchive" class="text-button">Cards</button>
    </header>

    <main class="entry-main">
      <h1>今日は、どこから始めよう。</h1>

      <div class="entry-options">
        <button class="entry-option" data-route="idea">思いついたことを話す</button>
        <button class="entry-option" data-route="emotion">今の気持ちを整理したい</button>
        <button class="entry-option" data-route="unknown">何から話せばいいか分からない</button>
        <button class="entry-option" data-route="casual">今日はなんとなく開いた</button>
      </div>

      <p class="entry-note">話したいことが決まっていなくても大丈夫です。</p>
    </main>
  </section>

  <section id="chat" class="screen chat">
    <header class="topbar chat-topbar">
      <button id="backToEntry" class="text-button">← 戻る</button>
      <div class="brand">FOCUS</div>
    </header>

    <main id="thread" class="thread" aria-live="polite"></main>

    <div id="quickChoices" class="quick-choices"></div>

    <button id="finishButton" class="finish-button hidden">今日はここまでにする</button>

    <form id="composer" class="composer">
      <textarea id="messageInput" rows="1" placeholder="ここに、自由に書いてみて"></textarea>
      <button id="sendButton" class="send-button" type="submit" aria-label="送信">↑</button>
    </form>
  </section>

  <section id="card" class="screen card-screen">
    <header class="topbar">
      <button id="backToChat" class="text-button">← 戻る</button>
      <div class="brand">FOCUS</div>
    </header>

    <main class="card-main">
      <article class="focus-card">
        <p class="card-label">今日のFocus</p>
        <p id="focusSuggestion" class="focus-suggestion"></p>

        <label class="edit-label" for="focusEdit">言葉を整える</label>
        <textarea id="focusEdit" class="focus-edit" rows="4"></textarea>

        <button id="saveCard" class="primary-button">この言葉で残す</button>
        <button id="skipCard" class="secondary-button">今日は残さない</button>
      </article>
    </main>
  </section>

  <section id="archive" class="screen archive">
    <header class="topbar">
      <button id="archiveBack" class="text-button">← 戻る</button>
      <div class="brand">FOCUS</div>
    </header>

    <main class="archive-main">
      <h2>Focus Cards</h2>
      <div id="cardList" class="card-list"></div>
      <button id="startAgain" class="secondary-button">新しく話す</button>
    </main>
  </section>
</div>

<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
